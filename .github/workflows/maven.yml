name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [ 'alerting-ms', 'analytics-ms', 'auth-ms', 'config-server', 'discovery-server', 'gateway-server', 'market-ms', 'notification-ms', 'profile-ms', 'reporting-ms', 'wallet-ms' ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build ${{ matrix.service }} with Maven
      run: |
        cd ${{ matrix.service }}
        mvn clean install -DskipTests
